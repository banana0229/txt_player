<div class="section">
  <div class="section_title" tag="素材註冊區">素材註冊區</div>
    <div class="text">每個分頁最上面都有素材註冊區，格式是：</div>
    <code>
      ```圖片
      圖片名稱A:網址
      圖片名稱B:網址
      ```
    </code>
    <code>
      ```聲音
      音檔名稱A:網址
      音檔名稱B:網址
      ```
    </code>
    <div class="text">這兩區都可有可無，但是圖片區基本上一定會有，不然顯示不了背景圖片。</div>
</div>
