<div class="section">
  <div class="section_title" tag="播放分頁格式">播放分頁格式</div>
    <div class="text">一個文件可以有很多個播放分頁，名稱自訂，但不能有相同名稱的播放分頁。</div>
    <div class="text">這是一個播放分頁的範例：</div>
    <code>
      ```圖片
      背景圖片:https://picsum.photos/600/400
      ```
      @[背景]背景圖片
      @[文字:AAA]A說話的內容內容
      `
      @[文字:BBB]B說話的內容內容
    </code>
    <div class="text">詳細指令使用可以看各指令分類的說明。</div>
    <div class="text">
      這個範例會先顯示A說話的內容，按一下空白鍵才會再顯示B說話的內容。<br/>
      每個 <text>`</text> 隔開的區塊都叫做 <text>播放片段</text> 。<br/>
      每個播放分頁都是由好幾格 <text>播放片段</text> 組成的。
    </div>
</div>
